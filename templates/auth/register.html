{% extends "base.html" %}
{% block title %}Register — OneReserve{% endblock %}
{% block content %}
<div class="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50 to-teal-50 flex items-center justify-center py-12 px-4">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden animate-slide-up">
      <div class="gradient-hero p-8 text-center">
        <div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center mx-auto mb-4">
          <i data-lucide="user-plus" class="w-8 h-8 text-white"></i>
        </div>
        <h1 class="text-2xl font-black text-white">Create Account</h1>
        <p class="text-white/70 text-sm mt-1">Join OneReserve and start exploring Bangladesh</p>
      </div>
      <div class="p-8">
        <form method="POST" action="/register" novalidate>
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-bold text-slate-700 mb-1.5">Full Name</label>
              <div class="relative">
                <i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                <input type="text" name="full_name" required placeholder="Your full name"
                  class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 focus:border-blue-400 focus:ring-2 focus:ring-blue-100 transition text-sm">
              </div>
            </div>
            <div>
              <label class="block text-sm font-bold text-slate-700 mb-1.5">Email Address</label>
              <div class="relative">
                <i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                <input type="email" name="email" required placeholder="you@example.com"
                  class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 focus:border-blue-400 focus:ring-2 focus:ring-blue-100 transition text-sm">
              </div>
            </div>
            <div>
              <label class="block text-sm font-bold text-slate-700 mb-1.5">Phone <span class="text-slate-400 font-normal">(optional)</span></label>
              <div class="relative">
                <i data-lucide="phone" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                <input type="tel" name="phone" placeholder="01XXXXXXXXX"
                  class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 focus:border-blue-400 focus:ring-2 focus:ring-blue-100 transition text-sm">
              </div>
            </div>
            <div>
              <label class="block text-sm font-bold text-slate-700 mb-1.5">Password</label>
              <div class="relative">
                <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                <input type="password" name="password" id="pw" required placeholder="Min. 6 characters"
                  class="w-full pl-10 pr-10 py-2.5 rounded-xl border border-slate-200 focus:border-blue-400 focus:ring-2 focus:ring-blue-100 transition text-sm">
                <button type="button" onclick="togglePw('pw','ei')" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                  <i data-lucide="eye" id="ei" class="w-4 h-4"></i>
                </button>
              </div>
            </div>
            <!-- Strength bar -->
            <div id="pw-wrap" class="hidden">
              <div class="flex gap-1 mb-1">
                <div class="h-1 flex-1 rounded-full bg-slate-200" id="s1"></div>
                <div class="h-1 flex-1 rounded-full bg-slate-200" id="s2"></div>
                <div class="h-1 flex-1 rounded-full bg-slate-200" id="s3"></div>
                <div class="h-1 flex-1 rounded-full bg-slate-200" id="s4"></div>
              </div>
              <p class="text-xs text-slate-500" id="pwlbl">Enter a password</p>
            </div>
          </div>
          <button type="submit" class="w-full btn-primary text-white font-black py-3 rounded-xl mt-6 shadow-lg text-sm">
            Create Account
          </button>
        </form>
        <p class="text-center text-sm text-slate-500 mt-5">
          Already have an account? <a href="/login" class="text-blue-600 font-bold hover:text-blue-700">Sign in</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
function togglePw(id,eid){
  const i=document.getElementById(id),e=document.getElementById(eid);
  if(i.type==='password'){i.type='text';e.setAttribute('data-lucide','eye-off');}
  else{i.type='password';e.setAttribute('data-lucide','eye');}
  lucide.createIcons();
}
document.getElementById('pw').addEventListener('input',function(){
  const v=this.value,w=document.getElementById('pw-wrap');
  w.classList.remove('hidden');
  let s=0;
  if(v.length>=6)s++;if(v.length>=10)s++;
  if(/[A-Z]/.test(v)&&/[0-9]/.test(v))s++;
  if(/[^A-Za-z0-9]/.test(v))s++;
  const colors=['','bg-red-400','bg-orange-400','bg-yellow-400','bg-green-500'];
  [1,2,3,4].forEach(n=>{document.getElementById('s'+n).className='h-1 flex-1 rounded-full '+(n<=s?colors[s]:'bg-slate-200');});
  document.getElementById('pwlbl').textContent=['','Weak','Fair','Good','Strong'][s]||'Too short';
});
</script>
{% endblock %}
