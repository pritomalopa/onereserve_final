{% extends "base.html" %}
{% block title %}Page Not Found — OneReserve{% endblock %}
{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4">
  <div class="text-center max-w-md animate-slide-up">
    <div class="text-8xl font-black text-slate-100 mb-2 select-none">404</div>
    <div class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-6 -mt-10">
      <i data-lucide="map-off" class="w-10 h-10 text-blue-400"></i>
    </div>
    <h1 class="text-2xl font-black text-slate-800 mb-2">Page Not Found</h1>
    <p class="text-slate-500 text-sm mb-8">The page you're looking for doesn't exist or has been moved.</p>
    <div class="flex flex-col sm:flex-row gap-3 justify-center">
      <a href="/" class="btn-primary text-white font-black px-6 py-3 rounded-xl inline-flex items-center gap-2 shadow-lg">
        <i data-lucide="home" class="w-4 h-4"></i>Go Home
      </a>
      <a href="/destinations" class="px-6 py-3 rounded-xl border-2 border-slate-200 text-slate-600 font-bold hover:bg-slate-50 transition inline-flex items-center gap-2">
        <i data-lucide="map" class="w-4 h-4"></i>Explore Destinations
      </a>
    </div>
  </div>
</div>
{% endblock %}
